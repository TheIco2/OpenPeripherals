<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenPeripheral - Profiles</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-logo">OP</div>
        <span class="brand-text">OpenPeripheral</span>
      </div>
      <div class="collapse-btn">&#8249;</div>
    </div>
    <div class="nav-section">
      <a class="nav-item" href="devices.html"><div class="nav-icon">D</div><span class="nav-text">Devices</span></a>
      <a class="nav-item" href="addons.html"><div class="nav-icon">A</div><span class="nav-text">Addons</span></a>
      <a class="nav-item" href="ai_learning.html"><div class="nav-icon">AI</div><span class="nav-text">AI Learning</span></a>
      <a class="nav-item active" href="profiles.html"><div class="nav-icon">P</div><span class="nav-text">Profiles</span></a>
    </div>
    <div class="nav-spacer"></div>
    <div class="sidebar-bottom">
      <div class="bottom-buttons">
        <a class="bottom-btn" href="settings.html">S</a>
        <div class="bottom-btn" data-cmd="toggle-theme">T</div>
        <div class="bottom-btn" data-cmd="notifications">N</div>
      </div>
      <div class="clock-container"><span class="clock-time" id="clock">00:00:00</span></div>
    </div>
  </div>
  <div class="page-content">
    <div class="page">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <div>
          <h1>Profiles</h1>
          <p class="subtitle">Manage device configuration profiles</p>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn-secondary">Import Profile</button>
          <button class="btn-secondary">Open Profiles Folder</button>
        </div>
      </div>
      <div class="profile-list">
        <div class="empty-state">
          <p>No profiles saved yet</p>
          <p class="hint">Profiles will appear here once you configure and save a device setup</p>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
