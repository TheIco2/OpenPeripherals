<div class="page-content">
  <div class="page">
    <div class="page-header">
      <span class="page-header-label">Dashboard</span>
      <div class="page-header-row">
        <h1>Connected Devices</h1>
        <div class="actions-bar">
          <button class="btn-secondary" id="btn-scan" data-action="ipc" data-ns="devices" data-cmd="scan">Scan</button>
        </div>
      </div>
      <p class="subtitle">Peripherals detected on your system</p>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-value" id="device-count">0</span>
        <span class="stat-label">Devices</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="addon-count">0</span>
        <span class="stat-label">Addons</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="profile-count">0</span>
        <span class="stat-label">Profiles</span>
      </div>
    </div>

    <div class="device-list" id="device-list">
      <div class="empty-state">
        <div class="empty-state-icon">D</div>
        <p>No devices detected</p>
        <p class="hint">Connect a peripheral, or install an addon to add device support. You can also use AI Learning to reverse-engineer a new device.</p>
      </div>
    </div>
  </div>
</div>
