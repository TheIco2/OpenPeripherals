<div class="page-content">
  <div class="page">
    <div class="page-header">
      <span class="page-header-label">Configuration</span>
      <div class="page-header-row">
        <h1>Device Profiles</h1>
        <div class="actions-bar">
          <button class="btn-primary" data-action="ipc" data-ns="profiles" data-cmd="import">Import Profile</button>
          <button class="btn-secondary" data-action="ipc" data-ns="profiles" data-cmd="open-folder">Open Folder</button>
        </div>
      </div>
      <p class="subtitle">Saved device protocol profiles generated by AI Learning or imported from the community</p>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2>Saved Profiles</h2>
        <span class="tag tag-muted">0 profiles</span>
      </div>

      <div class="profile-list" id="profile-list">
        <div class="empty-state">
          <div class="empty-state-icon">P</div>
          <p>No profiles saved yet</p>
          <p class="hint">Complete an AI Learning session to generate a device profile, or import a community profile.</p>
        </div>
      </div>
    </div>
  </div>
</div>
